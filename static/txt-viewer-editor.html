<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notepad — PDF-Export</title>
  <link rel="icon" type="image/x-icon" href="/static/fav.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="/config.js"></script>
  <style>
    :root {
      --bg:      #0D1117;
      --surface: #161B22;
      --border:  #30363D;
      --accent:  #58A6FF;
      --red:     #E63946;
      --green:   #3FB950;
      --text:    #E6EDF3;
      --muted:   #8B949E;
      --topbar-h: 52px;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); }
    * { box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ── TOPBAR ── */
    #topbar {
      height: var(--topbar-h); flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
    }
    .slug-label {
      display: flex; align-items: center; gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px; font-weight: 600;
      color: var(--accent); white-space: nowrap;
      cursor: pointer; user-select: none;
    }
    .slug-label:hover { opacity: .8; }
    .slug-label span { font-size: 16px; }

    #estado {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; flex-shrink: 0;
    }

    /* presencia */
    #presencia {
      display: flex; align-items: center; gap: 6px;
      flex: 1; flex-wrap: wrap; overflow: hidden;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      padding: 3px 8px; border-radius: 20px;
      border: 1px solid rgba(88,166,255,.3);
      color: var(--muted); white-space: nowrap;
    }
    .chip.yo { border-color: rgba(63,185,80,.4); color: var(--green); }
    .chip .dot { font-size: 8px; }

    /* botones topbar */
    .btn-topbar {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      font-size: 12px; cursor: pointer; padding: 5px 10px;
      white-space: nowrap; transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .btn-topbar:hover { border-color: var(--accent); color: var(--text); }
    .btn-eliminar { border-color: rgba(230,57,70,.3); color: rgba(230,57,70,.7); }
    .btn-eliminar:hover { border-color: var(--red); color: var(--red); }

    /* ── TEXTAREA ── */
    #editor {
      flex: 1; display: block; width: 100%;
      background: var(--bg); color: var(--text);
      border: none; outline: none; resize: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px; line-height: 1.7;
      padding: 24px 32px;
      caret-color: var(--accent);
    }
    #editor::placeholder { color: var(--muted); }

    /* ── CONTROL INTERVALO ── */
    #intervalo-ctrl {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    #intervalo-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--muted);
      min-width: 28px; text-align: center; -webkit-user-select: none; user-select: none;
    }
    .btn-int {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 4px;
      font-size: 13px; font-weight: 600; line-height: 1;
      cursor: pointer; padding: 2px 7px;
      transition: border-color .15s, color .15s;
    }
    .btn-int:hover { border-color: var(--accent); color: var(--text); }

    /* ── FEEDBACK TOAST ── */
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 10px 16px; font-size: 13px;
      opacity: 0; transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 999;
    }
    #toast.visible { opacity: 1; transform: translateY(0); }

    /* ── MODAL CONFIRMACIÓN ── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 200;
    }
    #modal-overlay.visible { display: flex; }
    .modal {
      background: #1C2128; border: 1px solid var(--border);
      border-radius: 12px; padding: 28px 32px;
      max-width: 380px; width: 90%; text-align: center;
    }
    .modal h3 { margin-bottom: 10px; font-size: 16px; }
    .modal p { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-btns button {
      flex: 1; padding: 9px; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
    }
    .btn-cancel { background: #30363D; color: var(--text); }
    .btn-cancel:hover { background: #3D444D; }
    .btn-confirm-del { background: var(--red); color: #fff; }
    .btn-confirm-del:hover { opacity: .85; }
  </style>
</head>
<body>

<div id="topbar">
  <div class="slug-label" onclick="copiarUrl()" title="Copiar URL">
    <span>📝</span>
    <span id="slug-display">…</span>
  </div>

  <div id="estado">Cargando…</div>

  <div id="intervalo-ctrl" title="Intervalo de actualización idle">
    <button type="button" class="btn-int" onclick="cambiarIntervalo(-1)">−</button>
    <span id="intervalo-display">15s</span>
    <button type="button" class="btn-int" onclick="cambiarIntervalo(+1)">+</button>
  </div>

  <div id="presencia"></div>

  <button class="btn-topbar" onclick="copiarUrl()">📋 Copiar URL</button>
  <button class="btn-topbar btn-eliminar" onclick="confirmarEliminar()">🗑 Eliminar</button>
</div>

<textarea id="editor" placeholder="Empezá a escribir…" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>

<div id="toast"></div>

<div id="modal-overlay">
  <div class="modal">
    <h3>¿Eliminar este notepad?</h3>
    <p>Se borrará el contenido permanentemente para todos los que comparten este slug.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm-del" onclick="ejecutarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<script>
  const API  = window.AppConfig?.API_BASE_URL || '/api/v1';
  const SLUG = window.location.pathname.split('/').filter(Boolean)[1] || '';

  // ── CRC32 (tabla precalculada; coincide con binascii.crc32 de Python) ────────
  const _CRC_T = (() => {
    const t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      t[i] = c;
    }
    return t;
  })();
  function crc32(str) {
    const buf = new TextEncoder().encode(str);
    let c = 0xFFFFFFFF;
    for (let i = 0; i < buf.length; i++) c = _CRC_T[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
    return (c ^ 0xFFFFFFFF) >>> 0;
  }

  // ── Estado ───────────────────────────────────────────────────────────────────
  let versionLocal      = 0;
  let lineasConfirmadas = [];         // último estado confirmado por el servidor
  let lineasProtegidas  = new Map();  // lineIndex → timestamp del último keystroke
  let crc32Srv          = 0;
  let ultimaEdicion     = 0;
  let ultimoGuardado    = null;

  const PASOS = [5, 10, 15, 30, 60];
  let idxPaso = 2;  // 15 s por defecto

  let timDirty    = null;
  let timIdle     = null;
  let timContador = null;
  let timReconcil = null;

  const editor      = document.getElementById('editor');
  const elEstado    = document.getElementById('estado');
  const elPresencia = document.getElementById('presencia');
  const elSlug      = document.getElementById('slug-display');
  const elInterval  = document.getElementById('intervalo-display');

  // ── Diff líneas (client → server) ────────────────────────────────────────────
  // Compara el estado confirmado con el actual y genera deltas para el servidor.
  // Inserts y edits se aplican en orden ascendente; deletes en descendente.
  function calcularDeltas(anterior, actual) {
    const deltas = [];
    const max = Math.max(anterior.length, actual.length);
    for (let i = 0; i < max; i++) {
      if (i >= actual.length) {
        deltas.push({ n: i, op: 'delete' });
      } else if (i >= anterior.length) {
        deltas.push({ n: i, op: 'insert', texto: actual[i] });
      } else if (anterior[i] !== actual[i]) {
        deltas.push({ n: i, texto: actual[i] });
      }
    }
    return deltas;
  }

  // ── Recálculo de índices protegidos tras cambio estructural ──────────────────
  // Cuando el servidor inserta o borra líneas, desplaza los índices protegidos.
  function recalcularProtegidas(protegidas, conf, srv) {
    const delta = srv.length - conf.length;
    if (delta === 0) return protegidas;
    let primerCambio = Math.min(conf.length, srv.length);
    for (let i = 0; i < primerCambio; i++) {
      if (conf[i] !== srv[i]) { primerCambio = i; break; }
    }
    const nuevas = new Map();
    for (const [idx, ts] of protegidas.entries()) {
      nuevas.set(idx < primerCambio ? idx : idx + delta, ts);
    }
    return nuevas;
  }

  // ── Aplica contenido del servidor conservando líneas en edición ──────────────
  function aplicarContenidoServidor(contenidoSrv) {
    const srv   = contenidoSrv.split('\n');
    const loc   = editor.value.split('\n');
    const ahora = Date.now();

    lineasProtegidas = recalcularProtegidas(lineasProtegidas, lineasConfirmadas, srv);

    const resultado = srv.map((linea, i) => {
      const ts = lineasProtegidas.get(i);
      return (ts && ahora - ts < 3000 && i < loc.length) ? loc[i] : linea;
    });

    const nuevo = resultado.join('\n');
    const pos   = editor.selectionStart;
    editor.value = nuevo;
    editor.selectionStart = editor.selectionEnd = Math.min(pos, nuevo.length);
    lineasConfirmadas = srv.slice();
  }

  // ── API ───────────────────────────────────────────────────────────────────────
  async function apiGet() {
    const r = await fetch(`${API}/notepad/${SLUG}`);
    if (!r.ok) throw new Error(r.status);
    return (await r.json()).data;
  }
  async function apiPutLines(deltas) {
    const r = await fetch(`${API}/notepad/${SLUG}/lines`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ deltas })
    });
    if (!r.ok) throw new Error(r.status);
    return (await r.json()).data;
  }
  async function apiDelete() {
    const r = await fetch(`${API}/notepad/${SLUG}`, { method: 'DELETE' });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  // ── Bucle dirty (cada 1 s) ────────────────────────────────────────────────────
  async function syncDirty() {
    const actual  = editor.value.split('\n');
    const deltas  = calcularDeltas(lineasConfirmadas, actual);
    if (deltas.length === 0) return;
    setEstado('guardando');
    try {
      const data = await apiPutLines(deltas);
      lineasConfirmadas = actual.slice();
      crc32Srv          = data.crc32;
      versionLocal      = data.version;
      ultimoGuardado    = Date.now();
      renderizarVisitantes(data.visitantes);
      // Si hay divergencia (otro usuario escribió al mismo tiempo)
      // el bucle idle la resolverá cuando el usuario haga pausa.
      setEstado('ok');
    } catch (e) {
      setEstado('error');
    }
  }

  // ── Bucle idle (configurable) ─────────────────────────────────────────────────
  async function syncIdle() {
    try {
      const data = await apiGet();
      renderizarVisitantes(data.visitantes);
      versionLocal = data.version;
      const crc32Local = crc32(editor.value);
      if (data.crc32 !== crc32Local) {
        if (Date.now() - ultimaEdicion >= 3000) {
          aplicarContenidoServidor(data.contenido);
          crc32Srv = data.crc32;
          ultimoGuardado = Date.now();
          setEstado('sync');
        } else {
          crc32Srv = data.crc32;  // marcar divergencia, reconciliar al hacer pausa
        }
      }
    } catch (e) {
      setEstado('error');
    }
  }

  // ── Intervalo configurable ────────────────────────────────────────────────────
  function cambiarIntervalo(dir) {
    idxPaso = Math.max(0, Math.min(PASOS.length - 1, idxPaso + dir));
    elInterval.textContent = PASOS[idxPaso] + 's';
    clearInterval(timIdle);
    timIdle = setInterval(syncIdle, PASOS[idxPaso] * 1000);
  }

  // ── Keydown: proteger línea activa y programar reconciliación ─────────────────
  editor.addEventListener('keydown', () => {
    ultimaEdicion = Date.now();
    const pos = editor.selectionStart;
    const lineaActual = editor.value.substring(0, pos).split('\n').length - 1;
    lineasProtegidas.set(lineaActual, ultimaEdicion);
    setEstado('pendiente');
    // Reconciliar ~3 s después de que el usuario deje de escribir
    clearTimeout(timReconcil);
    timReconcil = setTimeout(async () => {
      if (crc32Srv !== 0 && crc32(editor.value) !== crc32Srv) {
        await syncIdle();
      }
    }, 3100);
  });

  // Purgar líneas protegidas expiradas cada 500 ms
  setInterval(() => {
    const ahora = Date.now();
    for (const [idx, ts] of lineasProtegidas.entries()) {
      if (ahora - ts >= 3000) lineasProtegidas.delete(idx);
    }
  }, 500);

  // ── Estado visual ─────────────────────────────────────────────────────────────
  function setEstado(tipo) {
    const mapa = {
      ok:        '✓ Guardado',
      pendiente: '· Sin guardar…',
      guardando: '⟳ Guardando…',
      sync:      '↓ Sincronizado',
      error:     '⚠ Sin conexión',
    };
    elEstado.textContent = mapa[tipo] || tipo;
    elEstado.style.color = tipo === 'error' ? 'var(--red)' : 'var(--muted)';
  }

  function actualizarContador() {
    if (!ultimoGuardado) return;
    if (editor.value !== lineasConfirmadas.join('\n')) return;
    const seg = Math.round((Date.now() - ultimoGuardado) / 1000);
    elEstado.textContent = seg < 5 ? '✓ Guardado' : `✓ Guardado · hace ${seg}s`;
  }

  // ── Presencia ─────────────────────────────────────────────────────────────────
  function renderizarVisitantes(lista) {
    if (!lista || lista.length === 0) { elPresencia.innerHTML = ''; return; }
    const soloYo = lista.length === 1 && lista[0].es_yo;
    if (soloYo) {
      elPresencia.innerHTML = '<span class="chip yo"><span class="dot">●</span>Solo vos</span>';
      return;
    }
    elPresencia.innerHTML = lista.map(v =>
      v.es_yo
        ? `<span class="chip yo" title="Tu IP"><span class="dot">●</span>${esc(v.ip)} <em>(vos)</em></span>`
        : `<span class="chip" title="Otro usuario"><span class="dot">●</span>${esc(v.ip)}</span>`
    ).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Acciones ──────────────────────────────────────────────────────────────────
  function copiarUrl() {
    navigator.clipboard.writeText(window.location.origin + '/txt-viewer/' + SLUG)
      .then(() => mostrarToast('URL copiada al portapapeles'))
      .catch(() => mostrarToast('No se pudo copiar la URL'));
  }

  function confirmarEliminar() {
    document.getElementById('modal-overlay').classList.add('visible');
  }
  function cerrarModal() {
    document.getElementById('modal-overlay').classList.remove('visible');
  }

  async function ejecutarEliminar() {
    cerrarModal();
    try {
      await apiDelete();
      clearInterval(timDirty); clearInterval(timIdle); clearInterval(timContador);
      mostrarToast('Notepad eliminado. Redirigiendo…');
      setTimeout(() => { window.location.href = '/txt-viewer.html'; }, 1200);
    } catch (e) {
      mostrarToast('Error al eliminar el notepad');
    }
  }

  let toastTimer = null;
  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('visible'), 2200);
  }

  // ── Arranque ──────────────────────────────────────────────────────────────────
  async function iniciar() {
    if (!SLUG) { window.location.href = '/txt-viewer.html'; return; }
    document.title = `${SLUG} — Notepad`;
    elSlug.textContent = SLUG;
    elInterval.textContent = PASOS[idxPaso] + 's';

    try {
      const data = await apiGet();
      editor.value         = data.contenido;
      lineasConfirmadas    = data.contenido.split('\n');
      versionLocal         = data.version;
      crc32Srv             = data.crc32 || 0;
      ultimoGuardado       = Date.now();
      renderizarVisitantes(data.visitantes);
      setEstado('ok');
    } catch (e) {
      setEstado('error');
    }

    timDirty    = setInterval(syncDirty, 1000);
    timIdle     = setInterval(syncIdle, PASOS[idxPaso] * 1000);
    timContador = setInterval(actualizarContador, 1000);
  }

  iniciar();
</script>
</body>
</html>
